body:
  text: 方縈勿伐將興勿殺將齊勿刳是逢凶朔天災繩繩弗滅不隕為善福乃來為不善禍乃或之卑牆勿增廢人勿興皇天之所棄而后帝之所憎晦曰冥冥上天有下政晝諒竿之長枸株覆車善游者死於梁下狻猊食虎天供時地供材民供力明王無思是謂三德卉木須時而後奮天惡毋欣平旦毋哭晦毋歌弦望齊宿是謂順天之常敬者得之怠者失之是謂天常天神之皇天將興之毋為僞詐上帝將憎之忌期而不忌期天乃降災已而不已天乃降異其身不沒至於孫子陽而幽是謂大戚幽而陽是謂不祥齊齊節節外內有辨男女有節是謂天禮敬之敬之天命孔明如反之必遇凶殃毋詬政卿於神次毋享逸安求利殘其親是謂罪君無主臣是謂危邦家其壞憂懼之閒疏達之次毋謂之不敢毋謂之不然故常不利邦失幹常小邦則剗大邦過傷變常易禮土地乃坼民乃夭死善哉善哉三善哉唯福之基過而改之之未可以遂君子不慎其德四荒之內是帝之關臨民以仁民莫弗親興興民事行往視來民之所喜上帝是祐凡度官於人是謂邦固度人於官是謂邦吕慮亂建五官弗措是謂反逆土地乃坼民人乃喪喜樂無期度是謂大荒皇天弗諒必復之以憂喪凡食飲無量計是謂叨皇上帝弗諒必復之以荒上帝弗諒以祀不享邦四益是謂方華雖盈必虛宫室過度皇天之所惡雖成弗居衣服過制失於美是謂違章上帝弗諒鬼神禋祀上帝乃怡邦家落敬天之圄禦興地之弡恆道必天哉人哉憑何親哉沒其身哉知天足以順時知地足以固材知人足以會親不修其成而聽其縈百事不遂慮事不成仰天事君嚴恪必信俯視地理務農敬戒毋不能而為之毋能而易之驟奪民時天飢必來奪民時以土攻是謂稽不絶憂恤必喪其佖粃奪民時以水事是謂淖溺喪怠以係繼樂四方來囂奪民時以兵事是謂厲禍因胥歲不舉銍艾不懈於時上帝喜之乃無凶災香港簡保乃無凶災高陽曰毋凶服以享祀毋錦袀衣交袒子是謂忘神皇后曰立毋為角言毋為人倡毋作大事毋害常毋壅川毋斷汙毋滅宗毋虛牀藏毋改圄毋變事毋煩姑嫂毋恥父兄毋羞貧毋笑刑毋揣深毋度山毋逸其身而多其言居毋惰作毋荒善勿滅不祥勿為入墟毋樂登丘毋歌所以為天禮臨川之都憑岸之邑百乘之家十室之嚳造宮室汙池各慎其度毋失其道嗜欲殺人不飲不食秉之不固施之不威至刑以哀增去以謀民之所欲鬼神是祐慎守虛以怒為首身且有病惡菜與食邦且亡惡聖人之謀室且棄不墮綏祭祀唯怒是服凡若是者不有大禍必有大恥天之所敗多其賕而寡其憂興而起之使蹎而勿救
